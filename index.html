<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Regina Hona - Homepage</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- INTRO ANIMATION BEFORE HOMEPAGE SCREEN -->
     <section class="introPage" id="intro_page">
        <div class="introBackground">
            <img src="images/edited-photo.png" alt="intro animation image"
        </div>

        <div class="introOverlayer"></div>

        <div class="introElements">
            <img src="images/logo.png" alt="regina hona's logo" class="introLogo">

            <p class="introText" id="intro_text">
                Let me help you bring the love of water into your life.
            </p>

            <p class="instructionToStart" id="Instruction_tap">
                Tap to begin exploration
            </p>
        </div>
     </section>

     <!-- ACTUAL HOMEPAGE -->
    <div class="actualHomepage" id="actual_homepage">
        <header class="siteHeader">
            <div class="leftsideHeader">
                <button class="hamburgerMenubar" id="menu_bar" aria-label="Open menu">
                    <img src="images/open_menu.png" alt="open menu icon"
                </button>
            </div>
        </header>
    </div>

</body>
</html>
